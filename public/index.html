<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Council</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --border: #2a2f3a; --text: #e6e8ee;
    --muted: #8b93a5; --claude: #d97748; --codex: #4fb6a6; --accent: #7aa2f7;
    --good: #4caf7d; --bad: #e06c75; --warn: #e5c07b;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text); font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 14px 20px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 12px; }
  header h1 { font-size: 17px; letter-spacing: .3px; }
  header span { color: var(--muted); font-size: 12.5px; }
  #prompt-bar { display: flex; gap: 8px; padding: 12px 20px; border-bottom: 1px solid var(--border); }
  #prompt { flex: 1; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font: inherit; resize: vertical; min-height: 44px; max-height: 160px; }
  #seed { width: 260px; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font: inherit; }
  button { background: var(--accent); color: #10131a; border: 0; border-radius: 8px; padding: 10px 16px; font: inherit; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: .4; cursor: default; }
  button.ghost { background: var(--panel); color: var(--text); border: 1px solid var(--border); }
  button.danger { background: transparent; color: var(--bad); border: 1px solid var(--bad); }
  #stages { display: flex; gap: 6px; padding: 10px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; align-items: center; }
  .chip { padding: 3px 10px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); font-size: 12px; }
  .chip.active { border-color: var(--accent); color: var(--accent); }
  .chip.done { color: var(--good); border-color: var(--good); }
  .chip.failed { color: var(--bad); border-color: var(--bad); }
  #cancel { margin-left: auto; padding: 4px 12px; font-size: 12px; }
  #panes { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); min-height: 0; }
  .pane { background: var(--bg); display: flex; flex-direction: column; min-height: 0; }
  .pane-head { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-bottom: 1px solid var(--border); font-weight: 600; }
  .pane-head .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .pane-head .dot.working { background: var(--accent); animation: pulse 1.2s infinite; }
  .pane-head .dot.done { background: var(--good); }
  .pane-head .dot.failed { background: var(--bad); }
  @keyframes pulse { 50% { opacity: .3; } }
  .pane[data-actor="claude"] .pane-head { color: var(--claude); }
  .pane[data-actor="codex"] .pane-head { color: var(--codex); }
  .feed { flex: 1; overflow-y: auto; padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; }
  .event { border-left: 2px solid var(--border); padding: 2px 0 2px 10px; white-space: pre-wrap; word-break: break-word; }
  .event.tool { color: var(--muted); font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace; }
  .event.status { color: var(--accent); font-size: 12.5px; }
  .event.error { color: var(--bad); }
  .event.note { color: var(--warn); border-left-color: var(--warn); }
  #action { border-top: 1px solid var(--border); padding: 12px 20px; display: none; flex-direction: column; gap: 10px; max-height: 40vh; overflow-y: auto; }
  #action.visible { display: flex; }
  #action h2 { font-size: 13.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
  .critique { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; white-space: pre-wrap; font-size: 13px; max-height: 22vh; overflow-y: auto; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .verdict { font-weight: 700; }
  .verdict.APPROVE { color: var(--good); }
  .verdict.REQUEST_CHANGES, .verdict.REVIEW_FAILED { color: var(--bad); }
  .verdict.UNCLEAR, .verdict.UNREVIEWED { color: var(--warn); }
  code { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-size: 12.5px; }
</style>
</head>
<body>
<header><h1>Council</h1><span>one prompt &middot; two models &middot; cross-critique &middot; leader integration &middot; peer-reviewed publish</span>
  <select id="runpicker" style="margin-left:auto;background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font:inherit;max-width:420px"></select>
</header>
<div id="prompt-bar">
  <textarea id="prompt" placeholder="Describe what to build. Both models start immediately and independently."></textarea>
  <input id="seed" placeholder="Optional: path to seed git repo">
  <button id="run">Run council</button>
</div>
<div id="stages"></div>
<div id="panes">
  <div class="pane" data-actor="claude"><div class="pane-head"><span class="dot" id="dot-claude"></span>Claude</div><div class="feed" id="feed-claude"></div></div>
  <div class="pane" data-actor="codex"><div class="pane-head"><span class="dot" id="dot-codex"></span>Codex</div><div class="feed" id="feed-codex"></div></div>
</div>
<div id="action"></div>
<script>
const STAGES = ["generating","critiquing","awaiting_leader","integrating","final_review","awaiting_publish","publishing","published"];
const LABELS = { generating: "1 · Generate", critiquing: "2 · Cross-critique", awaiting_leader: "3 · Pick leader", integrating: "4 · Leader integrates", final_review: "5 · Final review", awaiting_publish: "6 · Publish gate", publishing: "6 · Publishing…", published: "✓ Published" };
const ACTIVE_STAGES = new Set(["generating","critiquing","awaiting_leader","integrating","final_review","awaiting_publish"]);
let current = null;
let source = null;
let seen = new Set();
let runList = [];
const ACTIVE = new Set(["generating","critiquing","awaiting_leader","integrating","final_review","awaiting_publish","publishing"]);

const $ = (id) => document.getElementById(id);

async function loadRuns() {
  runList = await fetch("/api/runs").then((r) => r.json());
  const picker = $("runpicker");
  picker.innerHTML = "";
  for (const run of runList) {
    const option = document.createElement("option");
    option.value = run.id;
    const mark = ACTIVE.has(run.stage) ? "● " : run.stage === "published" ? "✓ " : "✗ ";
    option.textContent = `${mark}${run.stage} · ${(run.prompt ?? "").slice(0, 44)}`;
    picker.appendChild(option);
  }
  return runList;
}

function switchTo(runId) {
  const run = runList.find((r) => r.id === runId);
  if (!run) return;
  current = run;
  $("runpicker").value = runId;
  renderStages(); setDots(); renderAction(); attach(runId);
}

document.addEventListener("change", (event) => {
  if (event.target.id === "runpicker") switchTo(event.target.value);
});

function renderStages() {
  const holder = $("stages");
  holder.innerHTML = "";
  const activeIndex = current ? STAGES.indexOf(current.stage) : -1;
  STAGES.forEach((stage, index) => {
    if (stage === "publishing" && (!current || current.stage !== "publishing")) return;
    if (stage === "awaiting_publish" && current && current.stage === "publishing") return;
    const chip = document.createElement("span");
    chip.className = "chip" + (index === activeIndex ? " active" : index < activeIndex ? " done" : "");
    chip.textContent = LABELS[stage];
    holder.appendChild(chip);
  });
  if (current && current.stage === "failed") {
    const chip = document.createElement("span");
    chip.className = "chip failed";
    chip.textContent = "✗ " + (current.error ?? "failed");
    holder.appendChild(chip);
  }
  if (current && ACTIVE_STAGES.has(current.stage)) {
    const cancel = document.createElement("button");
    cancel.id = "cancel";
    cancel.className = "danger";
    cancel.textContent = "Cancel run";
    cancel.onclick = () => { cancel.disabled = true; post("/api/runs/" + current.id + "/cancel"); };
    holder.appendChild(cancel);
  }
}

function addEvent(actor, kind, text) {
  if (actor === "system" && kind === "note") {
    for (const target of ["claude", "codex"]) {
      const div = document.createElement("div");
      div.className = "event note";
      div.textContent = "◆ " + text;
      appendToFeed($("feed-" + target), div);
    }
    return;
  }
  const feed = $("feed-" + actor);
  if (!feed) return;
  const div = document.createElement("div");
  div.className = "event " + kind;
  div.textContent = kind === "tool" ? "⚙ " + text : text;
  appendToFeed(feed, div);
}

function appendToFeed(feed, div) {
  const pinned = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 60;
  feed.appendChild(div);
  if (pinned) feed.scrollTop = feed.scrollHeight;
}

function setDots() {
  if (!current) return;
  for (const actor of ["claude", "codex"]) {
    $("dot-" + actor).className = "dot " + (current.actorStatus?.[actor] ?? "idle");
  }
}

async function post(path, body) {
  const response = await fetch(path, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body ?? {}) });
  if (!response.ok) alert((await response.json()).error ?? "request failed");
  return response;
}

function once(button, action) {
  button.disabled = true;
  action().finally(() => { button.disabled = false; });
}

function verdictLabel() {
  if (!current) return "";
  if (current.verdict) return current.verdict;
  return current.finalReview ? "UNCLEAR" : "UNREVIEWED";
}

function renderAction() {
  const action = $("action");
  action.className = "";
  action.innerHTML = "";
  if (!current) return;
  if (current.stage === "awaiting_leader") {
    action.className = "visible";
    const critique = (actor, counterpart, color) => `<div style="flex:1"><strong style="color:var(--${color})">${actor} on ${counterpart}'s code</strong><div class="critique">${escapeHtml(current.critiques[actor.toLowerCase()] ?? "(critique unavailable — this agent's critique turn failed)")}</div></div>`;
    action.innerHTML = `<h2>Both critiques are in — choose which solution leads</h2>
      <div class="row" style="align-items:stretch">${critique("Claude", "Codex", "claude")}${critique("Codex", "Claude", "codex")}</div>
      <div class="row" id="leader-buttons">
        <button data-leader="claude">Lead with Claude</button>
        <button data-leader="codex">Lead with Codex</button>
      </div>`;
    for (const button of action.querySelectorAll("#leader-buttons button")) {
      button.onclick = () => {
        for (const b of action.querySelectorAll("button")) b.disabled = true;
        post("/api/runs/" + current.id + "/leader", { leader: button.dataset.leader });
      };
    }
  } else if (current.stage === "awaiting_publish") {
    action.className = "visible";
    const verdict = verdictLabel();
    const soleSurvivor = !current.finalReview && !current.verdict;
    action.innerHTML = `<h2>Final review verdict: <span class="verdict ${verdict}">${verdict}</span> (leader: ${current.leader})${soleSurvivor ? " — the other agent failed; this result was never peer-reviewed" : ""}</h2>
      <div class="critique">${escapeHtml(current.finalReview ?? "(no review — the counterpart agent failed during generation)")}</div>
      <div class="row" id="gate-buttons"></div>`;
    const row = action.querySelector("#gate-buttons");
    const add = (label, cls, handler) => {
      const button = document.createElement("button");
      button.textContent = label;
      if (cls) button.className = cls;
      button.onclick = () => { for (const b of row.querySelectorAll("button")) b.disabled = true; handler(); };
      row.appendChild(button);
    };
    add(verdict === "APPROVE" ? "Publish result" : "Publish anyway", "", () => post("/api/runs/" + current.id + "/publish"));
    if (current.verdict === "REQUEST_CHANGES" || current.verdict === "UNCLEAR") {
      add("Send back for revision", "ghost", () => post("/api/runs/" + current.id + "/revise"));
    }
    if (current.verdict === "REVIEW_FAILED") {
      add("Retry final review", "ghost", () => post("/api/runs/" + current.id + "/retry-review"));
    }
  } else if (current.stage === "published") {
    action.className = "visible";
    const verdict = current.published.verdict ?? "UNREVIEWED";
    action.innerHTML = `<h2>Published</h2>
      <div class="row">Result (leader: <strong>${current.published.leader}</strong>, verdict: <span class="verdict ${verdict}">${verdict}</span>) at
      <code>${escapeHtml(current.published.path)}</code> branch <code>${escapeHtml(current.published.branch)}</code>
      ${current.published.seedBranch ? " — also fetched into the seed repo as <code>" + escapeHtml(current.published.seedBranch) + "</code>" : ""}</div>`;
  }
}

function escapeHtml(value) {
  const div = document.createElement("div");
  div.textContent = value ?? "";
  return div.innerHTML;
}

function attach(runId) {
  if (source) source.close();
  $("feed-claude").innerHTML = "";
  $("feed-codex").innerHTML = "";
  seen = new Set();
  source = new EventSource("/api/runs/" + runId + "/events");
  source.onmessage = (message) => {
    const event = JSON.parse(message.data);
    if (event.seq !== undefined) {
      if (seen.has(event.seq)) return;
      seen.add(event.seq);
    }
    if (event.kind === "stage") {
      current = JSON.parse(event.text);
      renderStages(); setDots(); renderAction();
      return;
    }
    addEvent(event.actor, event.kind, event.text);
    setDots();
  };
}

$("run").addEventListener("click", async () => {
  const prompt = $("prompt").value.trim();
  if (!prompt) return;
  if (!$("seed").value.trim() && /\b(repo|repository|codebase|readme|roadmap|existing|refactor)\b/i.test(prompt)) {
    if (!confirm("No seed repo is set — this will be a GREENFIELD run (both agents start from empty folders). Your prompt sounds like it targets an existing codebase. Run anyway?")) return;
  }
  $("run").disabled = true;
  try {
    const response = await post("/api/runs", { prompt, seedRepo: $("seed").value.trim() || undefined });
    const run = await response.json();
    if (run.id) { await loadRuns(); switchTo(run.id); }
  } finally {
    $("run").disabled = false;
  }
});

loadRuns().then((list) => {
  if (list.length === 0) return;
  // Prefer the newest still-active run so a finished side-run never hides the
  // one the user is actually waiting on.
  const active = list.find((r) => ACTIVE.has(r.stage));
  switchTo((active ?? list[0]).id);
});
renderStages();
</script>
</body>
</html>
