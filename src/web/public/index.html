<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mixture of Harnesses</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; margin: 0; background: #0b0e14; color: #d6deeb; }
  header { padding: 12px 16px; border-bottom: 1px solid #223; display: flex; align-items: baseline; gap: 12px; }
  h1 { font-size: 15px; margin: 0; }
  .tag { color: #8aa; font-size: 12px; }
  main { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px 16px; }
  .card { border: 1px solid #223; border-radius: 6px; padding: 10px; background: #0e1420; }
  .card h2 { font-size: 13px; margin: 0 0 6px; color: #9cf; }
  .prov { font-size: 12px; color: #9aa; white-space: pre-wrap; }
  #feed { grid-column: 1 / 3; height: 40vh; overflow: auto; border: 1px solid #223; border-radius: 6px; padding: 8px; background: #080b11; }
  .ln { white-space: pre-wrap; }
  .stage { color: #c9a; } .ok { color: #7c7; } .warn { color: #db4; } .err { color: #e66; } .dim { color: #667; }
  button { font: inherit; background: #1a2536; color: #cde; border: 1px solid #345; border-radius: 4px; padding: 6px 10px; cursor: pointer; }
  button:hover { background: #24344c; }
  #gate { grid-column: 1 / 3; }
  .banner { grid-column: 1 / 3; color: #8aa; font-size: 12px; }
  code { color: #9cf; }
</style>
</head>
<body>
<header>
  <h1>Mixture of Harnesses</h1>
  <span class="tag">One task. Multiple harnesses. Better code. · loopback only · never pushes</span>
</header>
<main>
  <div class="banner">Local-first companion. This page uses an HttpOnly capability cookie; no secrets appear in the URL, HTML, or events. Content from harnesses is escaped.</div>
  <div class="card" id="seat-a"><h2>Seat A</h2><div class="prov dim">idle</div></div>
  <div class="card" id="seat-b"><h2>Seat B</h2><div class="prov dim">idle</div></div>
  <div id="gate"></div>
  <div style="grid-column:1/3"><button id="start">Run deterministic demo</button> <span id="result" class="dim"></span></div>
  <div id="feed"></div>
</main>
<script>
  // No secrets in JS. Mutations send Origin (implicit) + custom CSRF header; the
  // capability travels only via the HttpOnly cookie the browser attaches.
  const feed = document.getElementById('feed');
  function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function line(cls, text){ const d=document.createElement('div'); d.className='ln '+(cls||''); d.textContent=text; feed.appendChild(d); feed.scrollTop=feed.scrollHeight; }
  function setSeat(id, txt){ const el=document.querySelector('#'+id+' .prov'); if(el){ el.className='prov'; el.textContent=txt; } }

  async function post(path, body){
    return fetch(path, { method:'POST', headers:{ 'content-type':'application/json', 'x-moh-csrf':'1' }, body: JSON.stringify(body||{}) });
  }

  const es = new EventSource('/events');
  es.onmessage = (ev) => {
    let e; try { e = JSON.parse(ev.data); } catch { return; }
    switch(e.kind){
      case 'stage.entered': line('stage', '▸ '+esc(e.payload.stage)); break;
      case 'seat.turn.started': line('dim', '  '+esc(e.seatId)+' · '+esc(e.payload.role)); break;
      case 'seat.tool': line('dim', '    tool '+esc(e.payload.name)+(e.payload.summary?' — '+esc(e.payload.summary):'')); break;
      case 'seat.model.observed': if(e.provenance){ setSeat(e.seatId, provText(e.provenance)); } break;
      case 'seat.model.mismatch': line('warn', '    ⚠ model mismatch/fallback: '+esc(e.payload.requested)+' → '+esc(e.payload.reported)); break;
      case 'seat.turn.finished': line('ok', '  ✓ '+esc(e.seatId)); break;
      case 'seat.turn.failed': line('err', '  ✗ '+esc(e.seatId)+' '+esc(e.payload.message||'')); break;
      case 'review.ready': line('', '  review verdict: '+esc(e.payload.verdict)); break;
      case 'result.branch.created': line('ok', '  ★ local result branch: '+esc(e.payload.branch)); break;
      case 'gate.leader': renderLeaderGate(e.payload); break;
      case 'gate.result': renderResultGate(e.payload); break;
      case 'run.done': document.getElementById('result').textContent = 'status: '+esc(e.payload.status); break;
      case 'run.error': line('err', 'run error: '+esc(e.payload.message)); break;
    }
  };
  function provText(p){
    const rep = p.reportedModel ? p.reportedModel+' ('+(p.evidenceSource||'runtime')+')' : 'Not reported by harness';
    return (p.seatLabel||p.seatId)+'\nrequested: '+(p.requestedModel||'Harness default')+'\neffective model: '+rep+'\nauth: '+(p.authLabel||'unknown');
  }
  function renderLeaderGate(p){
    const g = document.getElementById('gate');
    g.innerHTML = '<div class="card"><h2>Leader selection</h2></div>';
    const card = g.firstChild;
    p.candidates.forEach(cd => { const b=document.createElement('button'); b.textContent='Choose '+cd.label; b.onclick=()=>{ post('/api/decision',{id:p.id,value:cd.seatId}); g.innerHTML=''; }; card.appendChild(b); });
  }
  function renderResultGate(p){
    const g = document.getElementById('gate');
    g.innerHTML = '<div class="card"><h2>Create local result branch</h2><div class="prov">verdict: '+esc(p.verdict)+(p.approved?' (approved)':' (not approved)')+'</div></div>';
    const card = g.firstChild;
    const yes=document.createElement('button'); yes.textContent = p.approved ? 'Create local result branch' : 'Override & create (records UNREVIEWED/OVERRIDDEN)';
    yes.onclick=()=>{ post('/api/decision',{id:p.id,value:{confirm:true,override:!p.approved}}); g.innerHTML=''; };
    const no=document.createElement('button'); no.textContent='Decline'; no.onclick=()=>{ post('/api/decision',{id:p.id,value:{confirm:false}}); g.innerHTML=''; };
    card.appendChild(yes); card.appendChild(no);
  }
  document.getElementById('start').onclick = () => { feed.innerHTML=''; post('/api/run',{}); };
</script>
</body>
</html>
